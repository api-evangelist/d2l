aid: d2l
name: D2L Brightspace
description: 'D2L Brightspace is a leading cloud-based learning management system
  (LMS) used by educational institutions and organizations worldwide to deliver, manage,
  and personalize learning experiences. The Brightspace Learning Framework REST API
  provides comprehensive programmatic access to courses, users, enrollments, grades,
  content, quizzes, discussions, and learning outcomes. Developers can extend and
  integrate Brightspace using OAuth 2.0 authentication, with SDKs available for JavaScript,
  Java, and .NET. The API supports a wide range of use cases including SIS integration,
  third-party LTI tool connections, data export, intelligent agents, ePortfolio management,
  and automated workflow orchestration across the full academic lifecycle.

  '
